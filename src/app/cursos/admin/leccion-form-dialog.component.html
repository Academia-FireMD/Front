<p-dialog
  [header]="leccion() ? 'Editar lección' : 'Nueva lección'"
  [visible]="visible()"
  (visibleChange)="onVisibleChange($event)"
  [modal]="true"
  [style]="{ width: '480px' }"
>
  <form [formGroup]="form" class="leccion-form">
    <div class="field">
      <label for="lf-titulo">Título</label>
      <input
        id="lf-titulo"
        pInputText
        formControlName="titulo"
        placeholder="Nombre de la lección"
        class="w-full"
      />
    </div>

    <div class="field">
      <label for="lf-orden">Orden</label>
      <p-inputNumber
        inputId="lf-orden"
        formControlName="orden"
        [min]="0"
        class="w-full"
      />
    </div>

    <small class="leccion-form__hint">
      El contenido (vídeo, texto, test, cuestionario) se añade después con el
      botón <strong>"Contenido"</strong> de la lección.
    </small>
  </form>

  <ng-template pTemplate="footer">
    <p-button label="Cancelar" severity="secondary" (onClick)="cancel()" />
    <p-button
      label="Guardar"
      icon="pi pi-check"
      [disabled]="form.invalid"
      (onClick)="save()"
    />
  </ng-template>
</p-dialog>
