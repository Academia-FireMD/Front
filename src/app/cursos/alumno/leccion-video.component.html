<app-bunny-player
  [playbackUrl]="playbackUrl()"
  (tiempoActual)="onTiempoActual($event)"
  (terminado)="onTerminado()"
/>

@if (!enAula()) {
  <div class="video-controls">
    <span class="tiempo-visto">
      <i class="pi pi-clock"></i>
      Tiempo visto: {{ segundosVisto() | number: "1.0-0" }} s
    </span>
    <button
      pButton
      label="Marcar como vista"
      icon="pi pi-check"
      class="p-button-success p-button-sm"
      [loading]="marcando()"
      (click)="marcarComoVista()"
    ></button>
  </div>
}
