<div class="leccion-test">
  @if (noFailedQuestions(); as payload) {
    <div
      class="leccion-test__repaso-empty"
      data-testid="leccion-test-no-failed"
      role="alert"
    >
      <i class="pi pi-book leccion-test__repaso-icon"></i>
      <h3>Esta lección es de repaso</h3>
      <p>{{ payload.message }}</p>
      <button
        pButton
        label="Ir a tests del tema"
        icon="pi pi-arrow-right"
        class="p-button-primary"
        (click)="irAlTema()"
        data-testid="leccion-test-cta-tema"
      ></button>
    </div>
  } @else {
    <div class="leccion-test__cta">
      <i class="pi pi-question-circle leccion-test__icon"></i>
      <p>Esta lección es un test de preguntas.</p>
      <button
        pButton
        label="Empezar test"
        icon="pi pi-play"
        class="p-button-primary"
        [loading]="starting()"
        [disabled]="starting() || preview()"
        (click)="empezarTest()"
        data-testid="leccion-test-start"
      ></button>
      @if (preview()) {
        <small class="leccion-test__preview-hint">
          (Vista previa: la acción está deshabilitada.)
        </small>
      }
    </div>
  }
</div>
