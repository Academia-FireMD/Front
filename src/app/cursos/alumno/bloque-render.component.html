<div class="bloque" [attr.data-tipo]="bloque().tipo">
  @switch (bloque().tipo) {
    @case ("VIDEO") {
      @if (playbackUrl()) {
        <div class="bloque-video">
          <iframe
            [src]="safeVideoUrl()"
            allow="autoplay; encrypted-media; picture-in-picture"
            allowfullscreen
            title="Vídeo del bloque"
          ></iframe>
        </div>
      } @else {
        <div class="bloque-empty">
          <i class="pi pi-video"></i>
          <p>El vídeo no está disponible todavía.</p>
        </div>
      }
    }

    @case ("TEXTO") {
      @if (bloque().contenidoMarkdown) {
        <div class="bloque-texto">
          <markdown [data]="bloque().contenidoMarkdown!"></markdown>
        </div>
      } @else {
        <p class="bloque-empty-text">Sin contenido.</p>
      }
    }

    @case ("TEST") {
      <app-bloque-test-inline
        [bloqueId]="bloque().id"
        [numPreguntas]="bloque().numPreguntas"
        [esDeRepaso]="bloque().esDeRepaso"
        [preview]="preview()"
        (completado)="completado.emit()"
      ></app-bloque-test-inline>
    }

    @case ("CUESTIONARIO") {
      <app-bloque-cuestionario
        [bloque]="bloque()"
        [preview]="preview()"
        (completado)="completado.emit()"
      ></app-bloque-cuestionario>
    }

    @case ("DOCUMENTO") {
      <app-bloque-documento
        [bloque]="bloque()"
        [preview]="preview()"
      ></app-bloque-documento>
    }
  }
</div>
