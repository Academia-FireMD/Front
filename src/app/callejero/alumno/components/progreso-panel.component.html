<div class="progreso-panel" data-testid="progreso-panel">
  <h3 class="progreso-panel__title">Progreso por zona</h3>

  @if (zonasSafe().length === 0) {
    <p class="progreso-panel__empty" data-testid="progreso-vacio">
      Practica una zona para empezar a registrar progreso.
    </p>
  } @else {
    <ul class="progreso-panel__list">
      @for (z of zonasSafe(); track z.zonaId) {
        <li
          class="progreso-panel__item"
          [class.progreso-panel__item--activa]="z.zonaId === zonaActivaId()"
          [attr.data-testid]="'progreso-zona-' + z.zonaId"
        >
          <div class="progreso-panel__row">
            <span class="progreso-panel__nombre">{{ z.nombre }}</span>
            <span class="progreso-panel__cifras">
              {{ z.dominadas }}/{{ z.totalCalles }}
            </span>
          </div>
          <p-progressBar
            [value]="porcentaje(z)"
            [showValue]="true"
          ></p-progressBar>
        </li>
      }
    </ul>
  }
</div>
