<div class="campaign-form p-4">
  <h2>Nueva campaña</h2>

  <form [formGroup]="form" (ngSubmit)="guardar()">
    <div class="grid">
      <div class="col-12 md:col-6">
        <label class="block mb-2">Slug (para API)</label>
        <input pInputText formControlName="slug" class="w-full" placeholder="tf-x" />
        <small class="text-500">Solo letras minúsculas, números y guiones</small>
      </div>
      <div class="col-12 md:col-6">
        <label class="block mb-2">Nombre</label>
        <input pInputText formControlName="name" class="w-full" />
      </div>
      <div class="col-12">
        <label class="block mb-2">Tipo</label>
        <p-dropdown
          formControlName="type"
          [options]="types"
          optionLabel="label"
          optionValue="value"
          placeholder="Seleccionar tipo"
          styleClass="w-full"
        ></p-dropdown>
      </div>
    </div>

    <div class="mt-4" *ngIf="form.get('type')?.value === 'PROGRAM_DATE'">
      <h4>Configuración aviso de fecha</h4>
      <div class="grid">
        <div class="col-12 md:col-6 flex align-items-center">
          <p-inputSwitch formControlName="hasDate"></p-inputSwitch>
          <label class="ml-2">Tiene fecha</label>
        </div>
        <div class="col-12 md:col-3" *ngIf="form.get('hasDate')?.value">
          <label class="block mb-2">Fecha inicio</label>
          <p-calendar formControlName="startDate" dateFormat="yy-mm-dd"></p-calendar>
        </div>
        <div class="col-12 md:col-3" *ngIf="form.get('hasDate')?.value">
          <label class="block mb-2">Fecha fin (opcional)</label>
          <p-calendar formControlName="endDate" dateFormat="yy-mm-dd"></p-calendar>
        </div>
      </div>
      <div class="grid mt-3">
        <div class="col-12">
          <label class="block mb-2">Mensaje con fecha</label>
          <textarea pInputTextarea formControlName="messageWithDate" rows="2" class="w-full"></textarea>
        </div>
        <div class="col-12">
          <label class="block mb-2">Mensaje sin fecha</label>
          <textarea pInputTextarea formControlName="messageWithoutDate" rows="2" class="w-full"></textarea>
        </div>
      </div>
    </div>

    <div class="mt-4 flex gap-2">
      <p-button label="Crear" type="submit" [loading]="loading"></p-button>
      <p-button label="Cancelar" severity="secondary" (click)="cancelar()"></p-button>
    </div>
  </form>
</div>
